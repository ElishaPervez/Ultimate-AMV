name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # ── Node ──────────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Bundled Python (embeddable) ────────────────────────────────────────
      - name: Download embeddable Python 3.13
        shell: pwsh
        run: |
          $url = "https://www.python.org/ftp/python/3.13.2/python-3.13.2-embed-amd64.zip"
          $zip = "$env:TEMP\python-embed.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath python -Force
          Remove-Item $zip

      - name: Bootstrap pip + base packages into bundled Python
        shell: pwsh
        run: ./bundle-deps.ps1

      # ── Bundled tools (yt-dlp, ffmpeg, ffprobe) ───────────────────────────
      - name: Download yt-dlp
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path tools | Out-Null
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "tools\yt-dlp.exe"

      - name: Download ffmpeg + ffprobe
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $zip = "$env:TEMP\ffmpeg.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $tmp = "$env:TEMP\ffmpeg-extract"
          Expand-Archive -Path $zip -DestinationPath $tmp -Force
          $bin = Get-ChildItem -Path $tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $bin.FullName -Destination "tools\ffmpeg.exe"
          $bin2 = Get-ChildItem -Path $tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $bin2.FullName -Destination "tools\ffprobe.exe"
          Remove-Item $zip, $tmp -Recurse -Force

      # ── Frontend + Tauri build ─────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      # ── Publish GitHub Release ─────────────────────────────────────────────
      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
          body: |
            Ultimate AMV is a Windows desktop app for building anime music video edits.

            It covers the full workflow: browse and download source footage, separate audio into vocals and instrumentals, extract and trim clips, then export the final cut — all without leaving the app.

            **What's included**
            - Built-in browser with automatic media detection for anime streaming sites
            - Audio separation powered by audio-separator, supporting both CPU and NVIDIA GPU (CUDA) modes
            - Frame-accurate clip extraction and export via ffmpeg
            - Download manager with yt-dlp integration for grabbing footage directly
            - First-run setup wizard that installs all ML dependencies into a self-contained Python environment
            - Customisable interface with preset themes and custom hex colour support

            **Requirements**
            - Windows 10 or later, 64-bit
            - Around 4 GB of free disk space for the app and base ML dependencies
            - GPU mode requires an NVIDIA GPU with up-to-date CUDA 12.x drivers

            **Getting started**
            Run the installer. On first launch, go to Settings and run the setup wizard to install the audio and clip processing backends. The wizard handles everything — no manual Python or dependency setup required.
